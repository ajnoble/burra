name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/snowgum
            git fetch origin main
            git checkout main
            git pull origin main
            docker compose up -d --build
            docker exec treasure-nginx nginx -s reload

  e2e:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Run E2E tests on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /opt/snowgum
            npx playwright install chromium --with-deps 2>/dev/null || true
            npm run test:e2e 2>&1
      - name: Upload traces on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/snowgum
            if [ -d e2e/test-results ]; then
              echo "E2E test results exist — check VPS at /opt/snowgum/e2e/test-results"
            fi
